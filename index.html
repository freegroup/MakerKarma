<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="MakerKarma - Vereinsaufgaben erledigen und Punkte sammeln" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/MakerKarma/manifest.json" />
    <title>MakerKarma</title>
    <script>
      // OAuth token extraction + SPA routing (runs before any module scripts)
      (function() {
        var params = new URLSearchParams(window.location.search);
        var token = params.get('token');
        var error = params.get('error');

        console.log('[Auth] URL:', window.location.href);
        console.log('[Auth] search params:', window.location.search);
        console.log('[Auth] token found:', !!token, token ? '(' + token.length + ' chars)' : '');
        console.log('[Auth] error found:', error || 'none');

        if (token && token.indexOf('.') !== -1) {
          console.log('[Auth] Valid JWT detected, extracting payload...');
          try {
            // base64url → base64 conversion (JWT uses url-safe encoding)
            var b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
            while (b64.length % 4) b64 += '=';
            var payload = JSON.parse(atob(b64));
            console.log('[Auth] Payload:', JSON.stringify(payload));
            localStorage.setItem('auth-storage', JSON.stringify({ state: { user: payload, token: token }, version: 0 }));
            console.log('[Auth] Stored in localStorage ✓');
          } catch(e) {
            console.error('[Auth] Failed to parse JWT:', e.message);
          }
          window.history.replaceState({}, '', window.location.pathname);
          console.log('[Auth] Cleaned URL → ', window.location.pathname);
          return;
        }

        if (token) {
          console.warn('[Auth] Token found but not a valid JWT (no dots):', token);
        }

        if (error) {
          console.log('[Auth] Error redirect, keeping params for login page');
          return;
        }

        // GitHub Pages SPA: restore route from 404 redirect
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          console.log('[Auth] SPA redirect restored:', decoded);
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }

        console.log('[Auth] localStorage auth-storage:', localStorage.getItem('auth-storage') ? 'exists' : 'empty');
      })();
    </script>
    <script type="module" crossorigin src="/MakerKarma/assets/index-DIFkKjs-.js"></script>
    <link rel="stylesheet" crossorigin href="/MakerKarma/assets/index-DM3UO_HR.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/MakerKarma/sw.js')
      }
    </script>
  </body>
</html>
