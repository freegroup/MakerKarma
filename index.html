<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="MakerKarma - Vereinsaufgaben erledigen und Punkte sammeln" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>MakerKarma</title>
    <script>
      // 1. Extract OAuth token from URL IMMEDIATELY (before any other scripts)
      (function() {
        var params = new URLSearchParams(window.location.search);
        var token = params.get('token');
        if (token && token.indexOf('.') !== -1) {
          try {
            var payload = JSON.parse(atob(token.split('.')[1]));
            localStorage.setItem('auth-storage', JSON.stringify({ state: { user: payload, token: token }, version: 0 }));
          } catch(e) {}
          window.history.replaceState({}, '', window.location.pathname);
          return; // skip SPA redirect
        }

        var error = params.get('error');
        if (error) {
          // Keep error params, just redirect to /login
          window.history.replaceState({}, '', window.location.pathname + 'login' + window.location.search);
          return;
        }

        // 2. GitHub Pages SPA: restore route from 404 redirect
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
