<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // GitHub Pages SPA redirect
      // If URL has ?token=, redirect directly to index with token preserved
      var l = window.location;
      var search = l.search;

      // Preserve token parameter as-is
      if (search.indexOf('token=') !== -1 || search.indexOf('error=') !== -1) {
        // Redirect to root with query params intact
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/MakerKarma/' + search);
      } else {
        // Standard SPA redirect for other paths
        var pathSegmentsToKeep = 1;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
    </script>
  </head>
</html>
